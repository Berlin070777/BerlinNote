<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f0e8" />
    <title>BerlinNote</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=server-import-12" />
  </head>
  <body>
    <main class="app">
      <section id="shelfView" class="shelf-view">
        <header class="shelf-header">
          <div>
            <p class="eyebrow">English Reading Studio</p>
            <h1>BerlinNote</h1>
          </div>
          <label class="import-button">
            <input id="bookInput" type="file" accept=".epub,application/epub+zip" />
            导入 EPUB
          </label>
        </header>

        <div class="shelf-actions">
          <button type="button" disabled>搜索</button>
          <button type="button" disabled>社区</button>
          <button type="button" disabled>笔记</button>
        </div>

        <section class="shelf-board">
          <div class="shelf-copy">
            <p class="drop-title">你的英文原著书架</p>
            <p class="drop-copy">导入 EPUB 会交给本地服务解析并保存到 books 文件夹；再次打开会恢复上次阅读位置。</p>
          </div>
          <button id="openSample" class="book-tile" type="button">
            <span>A Small Door in the Rain</span>
            <small>样书 · 点击打开</small>
          </button>
        </section>

        <section class="bookshelf-section">
          <div class="bookshelf-head">
            <h2>本机书架</h2>
            <small>读取 books 文件夹，也保留浏览器本机导入记录</small>
          </div>
          <div id="shelfBooks" class="bookshelf-list"></div>
        </section>
      </section>

      <section id="readerShell" class="reader-shell hidden">
        <div id="scrim" class="scrim hidden"></div>

        <aside class="drawer" id="drawer">
          <div class="drawer-head">
            <div>
              <p class="eyebrow">Contents</p>
              <h2 id="bookTitle">Untitled</h2>
            </div>
            <button id="closeDrawer" class="icon-button" aria-label="关闭目录">×</button>
          </div>
          <div class="toc-progress">
            <span id="tocProgress">0 / 0</span>
            <button id="prevChapter" type="button">上一章</button>
            <button id="nextChapter" type="button">下一章</button>
          </div>
          <nav id="chapterList" class="chapter-list" aria-label="章节目录"></nav>
          <section class="bookmark-section" aria-label="收藏位置">
            <div class="bookmark-head">
              <p class="eyebrow">Bookmarks</p>
              <span id="bookmarkCount">0</span>
            </div>
            <div id="bookmarkList" class="bookmark-list"></div>
          </section>
        </aside>

        <section class="reader">
          <div class="reader-toolbar">
            <button id="backToShelf" class="icon-button" aria-label="返回书架">‹</button>
            <button id="openDrawer" class="icon-button" aria-label="打开目录">☰</button>
            <div class="chapter-meta">
              <p id="chapterKicker">Chapter</p>
              <h2 id="chapterTitle">Select a chapter</h2>
              <small id="readingProgress">阅读 0%</small>
              <small id="audioCacheStatus" class="audio-cache-status">音频缓存待命</small>
            </div>
            <div class="toolbar-actions">
              <button id="playBook" class="icon-button" aria-label="朗读整本">▶︎</button>
              <button id="openSettings" class="icon-button" aria-label="阅读设置">Aa</button>
              <button id="stopSpeech" class="icon-button" aria-label="停止朗读">■</button>
            </div>
          </div>

          <article id="chapterContent" class="chapter-content"></article>
        </section>

        <aside id="settingsPanel" class="settings-panel collapsed">
          <div class="settings-head">
            <div>
              <p class="eyebrow">Reading Style</p>
              <h2>阅读设置</h2>
            </div>
            <button id="closeSettings" class="icon-button" aria-label="关闭设置">×</button>
          </div>

          <div class="settings-grid">
            <label>
              字体大小
              <input id="fontSizeControl" type="range" min="0.95" max="1.45" value="1.13" step="0.03" />
            </label>
            <label>
              行距
              <input id="lineHeightControl" type="range" min="1.55" max="2.25" value="1.92" step="0.05" />
            </label>
            <label>
              语速
              <input id="rateControl" type="range" min="0.65" max="1.25" value="0.9" step="0.05" />
            </label>
            <label>
              音色
              <select id="voiceSelect"></select>
            </label>
          </div>
          <p class="settings-note" id="coachNote">选择音色后，生成的音频会按句子缓存；再次播放同一句会优先使用本地缓存。</p>
        </aside>

        <aside id="wordPanel" class="word-panel collapsed">
          <div class="word-head">
            <div>
              <p class="eyebrow">Word Lookup</p>
              <h2 id="wordTitle">word</h2>
            </div>
            <button id="closeWord" class="icon-button" aria-label="关闭查词">×</button>
          </div>
          <p id="wordPhonetic" class="word-phonetic"></p>
          <div id="wordMeaning" class="word-meaning"></div>
          <button id="speakWord" class="primary-button" type="button">朗读单词</button>
        </aside>
      </section>
    </main>

    <div id="toast" class="toast hidden" role="status"></div>
    <script src="./app.js?v=server-import-12"></script>
  </body>
</html>
